<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thiết kế cầu thang kính</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS riêng -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-gray-100">

    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl">

            <h1 class="text-2xl font-bold mb-6 text-center">
                Thiết kế cầu thang kính
            </h1>

            <form id="main-form" class="space-y-4">

                <div>
                    <label class="block mb-1 font-medium">Chiều dài tổng thể (mm)</label>
                    <input name="total_length" type="number" class="w-full px-3 py-2 border rounded-lg" required>
                </div>

                <div class="grid grid-cols-2 gap-4">
    <!-- vế trên -->
    <div>
        <label class="block mb-1 font-medium">Chiều cao vế trên (mm)</label>
        <input name="upper_height" type="number"
            class="w-full px-3 py-2 border rounded-lg"
            required>
    </div>

    <!-- vế dưới -->
    <div>
        <label class="block mb-1 font-medium">Chiều cao vế dưới (mm)</label>
        <input name="lower_height" type="number"
            class="w-full px-3 py-2 border rounded-lg"
            required>
    </div>
</div>

                <!-- HOLES -->
                <div>
                    <label class="block mb-2 font-medium">Khoảng cách lỗ khoan (mm)</label>

                    <div id="holes-container" class="space-y-2">

                        <!-- item mặc định -->
                        <div class="flex gap-2 items-center">
                            <input type="number" name="holes[]" class="flex-1 px-3 py-2 border rounded-lg"
                                placeholder="Khoảng cách 1">

                            <!-- nút xoá -->
                            <button type="button" onclick="openConfirm(this)"
                                class="px-3 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">
                                <!-- icon thùng rác (SVG) -->
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M9 7V4h6v3" />
                                </svg>
                            </button>
                        </div>

                    </div>

                    <button type="button" id="btn-add-hole" class="mt-2 text-blue-600 hover:underline">
                        + Thêm khoảng cách
                    </button>
                </div>

                <div>
                    <label class="block mb-1 font-medium">Độ dày bê tông (mm)</label>
                    <input name="concrete_thickness" type="number" class="w-full px-3 py-2 border rounded-lg" required>
                </div>

                <div>
                    <label class="block mb-1 font-medium">Cao độ (mm)</label>
                    <input name="step_height" type="number" class="w-full px-3 py-2 border rounded-lg" required>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white px-3 py-2 rounded-lg hover:bg-blue-700">
                    Vẽ
                </button>

                <!-- Zoom -->
                <div class="block gap-2 mb-2">
                    <button type="button" onclick="zoomIn()" class="px-3 py-1 bg-blue-500 text-white rounded">
                        Zoom +
                    </button>

                    <button type="button" onclick="zoomOut()" class="px-3 py-1 bg-gray-500 text-white rounded">
                        Zoom -
                    </button>
                </div>

                <div id="drawing-container" class="mt-8">
                    <svg id="drawing" class="w-full border rounded bg-white"></svg>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL -->
    <div id="confirm-modal" class="fixed inset-0 hidden modal-overlay">
        <div class="modal-box">
            <h2>Xác nhận xoá</h2>
            <p>Bạn có chắc muốn xoá không?</p>
            <div class="flex justify-end gap-3 mt-4">
                <button onclick="closeModal()">Huỷ</button>
                <button onclick="confirmRemove()" class="bg-red-500 text-white px-3 py-1 rounded">
                    Xoá
                </button>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>

</body>
</html>
